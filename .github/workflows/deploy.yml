name: Auto Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 开启严格模式：命令失败直接退出 + 管道失败整体判定失败，阻断错误流程继续执行
            set -eo pipefail

            echo "===== 进入项目目录 ====="
            cd /www/bruce-nodejs

            echo "===== 拉取并同步远程 main 代码 ====="
            git fetch origin main
            git reset --hard origin/main
            echo "当前部署 commit: $(git rev-parse --short HEAD)"

            echo "===== 安装锁定版本依赖 ====="
            npm ci

            echo "===== 生成 Prisma 客户端 ====="
            npx prisma generate

            echo "===== TS 代码编译 ====="
            npm run build

            echo "===== 执行数据库生产迁移 ====="
            npx prisma migrate deploy

            echo "===== PM2 重启业务服务 ====="
            pm2 restart ecosystem.config.cjs || pm2 start ecosystem.config.cjs

            echo "===== 保存 PM2 进程快照 ====="
            pm2 save
            echo "✅ 自动部署全部流程执行完成"
