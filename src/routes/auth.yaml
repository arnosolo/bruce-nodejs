paths:
  /auth/register:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                  description: 密码需至少8位，且包含大写字母、小写字母和数字
                name:
                  type: string
      responses:
        201:
          description: User created successfully. Verification email sent.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
        400:
          description: Invalid email or password
  /auth/verify-email:
    post:
      summary: Verify user email using a 6-digit code
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - code
              properties:
                email:
                  type: string
                  format: email
                code:
                  type: string
                  example: "123456"
                  description: The 6-digit verification code sent to user's email
      responses:
        200:
          description: Email verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        400:
          description: Invalid or expired code
  /auth/resend-code:
    post:
      summary: Resend verification code to user's email
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        200:
          description: Verification code resent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        400:
          description: Email already verified or invalid request
        404:
          description: User not found
  /auth/send-login-code:
    post:
      summary: Send a one-time login code to user's email (auto-registers new users)
      tags: [Auth]
      description: |
        免注册登录第一步。输入邮箱即可收到 6 位验证码。
        - 已注册用户：发送登录验证码
        - 新用户：自动创建账号后发送验证码
        - 已注销用户：出于安全不暴露，返回统一成功提示
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        200:
          description: Login code sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        429:
          description: Too many requests, rate limited
  /auth/login-by-code:
    post:
      summary: Login using a one-time verification code (verifies email for new users)
      tags: [Auth]
      description: |
        免注册登录第二步。输入邮箱 + 验证码即可登录。
        首次登录的用户将同时完成邮箱验证。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - code
              properties:
                email:
                  type: string
                  format: email
                code:
                  type: string
                  example: "123456"
                  description: The 6-digit login code sent to user's email
      responses:
        200:
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                      user:
                        $ref: '#/components/schemas/User'
        400:
          description: Invalid or expired code
        401:
          description: Invalid credentials
        403:
          description: Account deleted
  /auth/login:
    post:
      summary: Login a user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        200:
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                      user:
                        $ref: '#/components/schemas/User'
        401:
          description: Invalid credentials
        500:
          description: Internal server error (e.g., Configuration Error)
  /auth/me:
    get:
      summary: Get current user profile
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/User'
        401:
          description: Unauthorized
    put:
      summary: Update current user profile
      tags: [Auth]
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                avatarKey:
                  type: string
                  description: OSS 中的头像路径 (例如 public/avatar/...)
      responses:
        200:
          description: Profile updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/User'
        400:
          description: Invalid input or email already taken
        401:
          description: Unauthorized
    delete:
      summary: Delete current user account (soft delete)
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Account deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        401:
          description: Unauthorized
  /auth/password:
    put:
      summary: Change current user password
      tags: [Auth]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - oldPassword
                - newPassword
              properties:
                oldPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
                  description: 密码需至少8位，且包含大写字母、小写字母和数字
      responses:
        200:
          description: Password changed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        400:
          description: Invalid old password or simple new password
        401:
          description: Unauthorized
  /auth/users:
    get:
      summary: List all users (Admin Only)
      tags: [Auth]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Number of items per page
        - in: query
          name: search
          schema:
            type: string
          description: Search by email or name
        - in: query
          name: role
          schema:
            type: string
            enum: [CUSTOMER, AGENT, AI, ADMIN]
          description: Filter by role
      responses:
        200:
          description: User list retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      list:
                        type: array
                        items:
                          $ref: '#/components/schemas/User'
                      pagination:
                        type: object
                        properties:
                          total:
                            type: integer
                          page:
                            type: integer
                          limit:
                            type: integer
                          totalPages:
                            type: integer
        401:
          description: Unauthorized
        403:
          description: Forbidden - Requires Admin role
  /auth/users/{id}/role:
    patch:
      summary: Update a user's role (Admin Only)
      tags: [Auth]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Target user ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - role
              properties:
                role:
                  type: string
                  enum: [CUSTOMER, AGENT, AI, ADMIN]
                  description: The new role for the user
      responses:
        200:
          description: User role updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/User'
        400:
          description: Invalid request or role type
        401:
          description: Unauthorized
        403:
          description: Forbidden - Requires Admin role
        404:
          description: Target user not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          description: Unique user ID
        email:
          type: string
          description: User's email address
        name:
          type: string
          nullable: true
          description: User's name
        avatarKey:
          type: string
          nullable: true
          description: OSS 中的头像路径
        avatarUrl:
          type: string
          nullable: true
          description: 头像的可访问 URL
        isEmailVerified:
          type: boolean
          description: 是否已验证邮箱
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time