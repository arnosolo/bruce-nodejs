paths:
  /conversations:
    get:
      summary: 获取会话列表 (支持 Offset 分页)
      tags: [Conversation]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: 页码
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
          description: 每页数量
      responses:
        200:
          description: 成功获取会话列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      list:
                        type: array
                        items:
                          $ref: '#/components/schemas/Conversation'
                      pagination:
                        type: object
                        properties:
                          total:
                            type: integer
                          page:
                            type: integer
                          limit:
                            type: integer
                          totalPages:
                            type: integer
        401:
          $ref: '#/components/responses/UnauthorizedError'
        500:
          $ref: '#/components/responses/ServerError'
    post:
      summary: 创建新会话
      tags: [Conversation]
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  default: "新会话"
      responses:
        201:
          description: 会话创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Conversation'
        400:
          $ref: '#/components/responses/BadRequestError'
        401:
          $ref: '#/components/responses/UnauthorizedError'
        500:
          $ref: '#/components/responses/ServerError'

  /conversations/{id}/messages:
    get:
      summary: 获取会话消息记录 (支持 Cursor 游标分页)
      tags: [Conversation]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: 会话 ID
        - in: query
          name: cursor
          schema:
            type: integer
          description: 游标（上一页最后一条消息的 ID）
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
          description: 获取的消息数量
      responses:
        200:
          description: 成功获取消息列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      list:
                        type: array
                        items:
                          $ref: '#/components/schemas/Message'
                      nextCursor:
                        type: integer
                        nullable: true
        400:
          $ref: '#/components/responses/BadRequestError'
        401:
          $ref: '#/components/responses/UnauthorizedError'
        403:
          $ref: '#/components/responses/ForbiddenError'
        404:
          $ref: '#/components/responses/NotFoundError'
        500:
          $ref: '#/components/responses/ServerError'
    post:
      summary: 发送消息并获取 AI 回复
      tags: [Conversation]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: 会话 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
              properties:
                content:
                  type: string
                  description: 消息内容
      responses:
        200:
          description: 消息发送成功并返回 AI 回复
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      userMessage:
                        $ref: '#/components/schemas/Message'
                      aiMessage:
                        $ref: '#/components/schemas/Message'
        400:
          $ref: '#/components/responses/BadRequestError'
        401:
          $ref: '#/components/responses/UnauthorizedError'
        403:
          $ref: '#/components/responses/ForbiddenError'
        404:
          $ref: '#/components/responses/NotFoundError'
        500:
          $ref: '#/components/responses/ServerError'

components:
  responses:
    BadRequestError:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnauthorizedError:
      description: 未授权
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ForbiddenError:
      description: 无权访问
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFoundError:
      description: 资源未找到
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServerError:
      description: 服务器内部错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        errorCode:
          type: string
    Conversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
          nullable: true
        userId:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deletedAt:
          type: string
          format: date-time
          nullable: true
    Message:
      type: object
      properties:
        id:
          type: integer
        content:
          type: string
        role:
          type: string
          enum: [USER, ASSISTANT, SYSTEM]
        conversationId:
          type: integer
        senderId:
          type: integer
          nullable: true
        sender:
          type: object
          nullable: true
          properties:
            name:
              type: string
              nullable: true
        createdAt:
          type: string
          format: date-time

