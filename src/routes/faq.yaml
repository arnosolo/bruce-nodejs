paths:
  /faqs/search:
    get:
      summary: 搜索最相关的 FAQ (向量匹配)
      tags: [FAQ]
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
          description: 搜索关键词或问题
        - in: query
          name: limit
          schema:
            type: integer
            default: 5
          description: 返回结果数量
      responses:
        200:
          description: 搜索成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        question:
                          type: string
                        answer:
                          type: string
                        similarity:
                          type: number
                          description: 相似度得分 (0-1)
        400:
          $ref: '#/components/responses/BadRequestError'
        500:
          $ref: '#/components/responses/ServerError'

  /faqs:
    get:
      summary: 获取所有 FAQ 列表 (支持 Offset 分页)
      tags: [FAQ]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: 页码
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
          description: 每页数量
        - in: query
          name: keyword
          schema:
            type: string
          description: 关键字搜索 (问题或答案)
      responses:
        200:
          description: 获取成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      list:
                        type: array
                        items:
                          $ref: '#/components/schemas/FAQ'
                      pagination:
                        type: object
                        properties:
                          total:
                            type: integer
                          page:
                            type: integer
                          limit:
                            type: integer
                          totalPages:
                            type: integer
        401:
          $ref: '#/components/responses/UnauthorizedError'
        500:
          $ref: '#/components/responses/ServerError'
    post:
      summary: 创建新 FAQ (自动生成向量)
      tags: [FAQ]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - question
                - answer
              properties:
                question:
                  type: string
                answer:
                  type: string
      responses:
        201:
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        401:
          $ref: '#/components/responses/UnauthorizedError'
        500:
          $ref: '#/components/responses/ServerError'

  /faqs/{id}:
    put:
      summary: 更新 FAQ (若更新问题则重新生成向量)
      tags: [FAQ]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                question:
                  type: string
                answer:
                  type: string
      responses:
        200:
          description: 更新成功
        401:
          $ref: '#/components/responses/UnauthorizedError'
        404:
          $ref: '#/components/responses/NotFoundError'
        500:
          $ref: '#/components/responses/ServerError'
    delete:
      summary: 删除 FAQ
      tags: [FAQ]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: 删除成功
        401:
          $ref: '#/components/responses/UnauthorizedError'
        404:
          $ref: '#/components/responses/NotFoundError'
        500:
          $ref: '#/components/responses/ServerError'

components:
  schemas:
    FAQ:
      type: object
      properties:
        id:
          type: integer
        question:
          type: string
        answer:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
