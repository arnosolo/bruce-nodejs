paths:
  /oss/upload:
    post:
      summary: 后端直接上传文件
      description: |
        将文件发送到后端，由后端完成 OSS 上传。
        使用 `multipart/form-data` 格式，字段名为 `file`。
      tags: [OSS]
      security:
        - bearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        200:
          description: 上传成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      name:
                        type: string
                        description: 文件名
                      url:
                        type: string
                        description: 文件的访问链接 (如果是私有读，可能需要签名)
                      key:
                        type: string
                        description: 文件在 OSS 中的唯一路径
        400:
          $ref: '#/components/responses/BadRequestError'
        401:
          $ref: '#/components/responses/UnauthorizedError'
        500:
          $ref: '#/components/responses/ServerError'
